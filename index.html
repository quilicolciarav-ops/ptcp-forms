<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Public+Sans:wght@400;500;600;700&display=swap');

#ptcp-root, #ptcp-root * { box-sizing: border-box; }
#ptcp-root {
  --navy:#0F2A5C;
  --navy-deep:#081A3D;
  --blue:#2452C8;
  --gold:#F0B429;
  --gold-deep:#C98A0E;
  --paper:#FAF7F0;
  --card:#FFFFFF;
  --ink:#1B1B1B;
  --ink-soft:#5A5647;
  --line:#DDD6C4;
  --line-soft:#EDE8DA;
  --red:#B3261E;
  --ok:#1E7B4D;
  font-family:'Public Sans', system-ui, sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:60px;
  line-height:1.5;
}
#ptcp-root h1,#ptcp-root h2,#ptcp-root h3 { font-family:'Lora', serif; color:var(--navy-deep); margin:0; }
#ptcp-root .banner-wrap{ background:#fff; border-bottom:4px solid var(--gold); }
#ptcp-root .banner-img{ display:block; width:100%; max-width:1100px; margin:0 auto; height:auto; }
#ptcp-root .banner-strip{ background:var(--navy-deep); color:#fff; text-align:center; font-size:12.5px; letter-spacing:.14em; text-transform:uppercase; padding:7px 10px; font-weight:600; }

#ptcp-root .shell{ max-width:920px; margin:28px auto; padding:0 18px; }
#ptcp-root .doc-code{ text-align:right; font-size:11px; color:var(--ink-soft); letter-spacing:.06em; margin-bottom:6px; font-variant-numeric:tabular-nums; }

#ptcp-root .card{ background:var(--card); border:1px solid var(--line); border-radius:4px; box-shadow:0 1px 3px rgba(15,42,92,.06), 0 10px 30px -18px rgba(15,42,92,.18); overflow:hidden; }
#ptcp-root .card-head{ padding:26px 30px 20px; border-bottom:1px solid var(--line-soft); }
#ptcp-root .eyebrow{ font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-deep); font-weight:700; margin-bottom:6px; }
#ptcp-root .card-head h2{ font-size:22px; }
#ptcp-root .card-head p.sub{ margin-top:8px; color:var(--ink-soft); font-size:14.5px; max-width:64ch; }
#ptcp-root .card-body{ padding:26px 30px 8px; }
#ptcp-root .card-foot{ padding:18px 30px 26px; display:flex; justify-content:space-between; align-items:center; gap:12px; }

/* dossier index (progress rail) */
#ptcp-root .layout{ display:grid; grid-template-columns:190px 1fr; gap:22px; align-items:start; }
#ptcp-root .rail{ position:sticky; top:14px; border-right:1px solid var(--line); padding-right:14px; }
#ptcp-root .rail-title{ font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-soft); margin-bottom:10px; font-weight:700; }
#ptcp-root .rail-item{ display:flex; align-items:flex-start; gap:9px; padding:7px 0; font-size:12.6px; color:var(--ink-soft); cursor:default; }
#ptcp-root .rail-num{ flex:0 0 auto; width:19px; height:19px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:var(--ink-soft); background:#fff; }
#ptcp-root .rail-item.done .rail-num{ background:var(--navy); border-color:var(--navy); color:#fff; }
#ptcp-root .rail-item.active .rail-num{ background:var(--gold); border-color:var(--gold); color:var(--navy-deep); }
#ptcp-root .rail-item.active{ color:var(--navy-deep); font-weight:700; }
#ptcp-root .rail-item.done{ color:var(--ink); }

@media (max-width:720px){
  #ptcp-root .layout{ grid-template-columns:1fr; }
  #ptcp-root .rail{ position:static; border-right:none; border-bottom:1px solid var(--line); padding-right:0; padding-bottom:12px; display:flex; overflow-x:auto; gap:14px; }
  #ptcp-root .rail-title{ display:none; }
  #ptcp-root .rail-item{ flex-direction:column; align-items:center; text-align:center; width:64px; flex:0 0 auto; font-size:10.5px; }
}

#ptcp-root .field{ margin-bottom:20px; }
#ptcp-root .field-label{ font-weight:600; font-size:14.5px; margin-bottom:8px; display:block; color:var(--navy-deep); }
#ptcp-root .field-label .req{ color:var(--red); margin-left:3px; }
#ptcp-root .field-hint{ font-size:12.5px; color:var(--ink-soft); margin-bottom:8px; }
#ptcp-root input[type=text], #ptcp-root input[type=date], #ptcp-root input[type=tel], #ptcp-root textarea, #ptcp-root select{
  width:100%; border:1.5px solid var(--line); border-radius:3px; padding:10px 12px; font-size:14.5px; font-family:inherit; color:var(--ink); background:#fff;
}
#ptcp-root textarea{ min-height:72px; resize:vertical; }
#ptcp-root input:focus, #ptcp-root textarea:focus, #ptcp-root select:focus{ outline:2.5px solid var(--blue); outline-offset:1px; border-color:var(--blue); }
#ptcp-root .options{ display:flex; flex-direction:column; gap:9px; }
#ptcp-root .opt-row{ display:flex; align-items:center; gap:10px; border:1.5px solid var(--line); border-radius:3px; padding:9px 12px; cursor:pointer; transition:border-color .12s, background .12s; }
#ptcp-root .opt-row:hover{ border-color:var(--blue); }
#ptcp-root .opt-row.checked{ border-color:var(--navy); background:#F1F4FC; }
#ptcp-root .opt-row input{ width:16px; height:16px; accent-color:var(--navy); flex:0 0 auto; }
#ptcp-root .opt-row span{ font-size:14.5px; }
#ptcp-root .opt-other-input{ margin-top:8px; }

#ptcp-root .checkbox-row{ display:flex; gap:10px; align-items:flex-start; border:1.5px solid var(--line); border-radius:3px; padding:12px; background:#FCFBF7; }
#ptcp-root .checkbox-row input{ width:17px; height:17px; margin-top:2px; accent-color:var(--navy); flex:0 0 auto; }
#ptcp-root .checkbox-row label{ font-size:13.8px; color:var(--ink); }

#ptcp-root .file-drop{ border:1.5px dashed var(--line); border-radius:4px; padding:16px; text-align:center; background:#FCFBF7; }
#ptcp-root .file-drop.has-file{ border-style:solid; border-color:var(--ok); background:#F2FAF5; }
#ptcp-root .file-drop input[type=file]{ display:none; }
#ptcp-root .file-btn{ display:inline-block; padding:8px 16px; background:var(--navy); color:#fff; border-radius:3px; font-size:13px; font-weight:600; cursor:pointer; }
#ptcp-root .file-name{ margin-top:8px; font-size:12.8px; color:var(--ink-soft); word-break:break-all; }
#ptcp-root .file-preview{ margin-top:10px; max-width:160px; max-height:120px; border-radius:3px; border:1px solid var(--line); }
#ptcp-root .file-note{ font-size:11.5px; color:var(--ink-soft); margin-top:6px; }

#ptcp-root .err{ color:var(--red); font-size:12.5px; margin-top:6px; font-weight:600; }
#ptcp-root .banner-notice{ border:1.5px solid var(--gold-deep); background:#FFF8E4; border-radius:4px; padding:14px 16px; font-size:13.3px; color:#5E4200; margin-bottom:20px; }
#ptcp-root .banner-notice.error{ border-color:var(--red); background:#FDECEB; color:#7A1B15; }

#ptcp-root .privacy-box{ border:1px solid var(--line); background:#FCFBF7; border-radius:4px; padding:18px 20px; font-size:13.6px; color:var(--ink); max-height:280px; overflow-y:auto; margin-bottom:18px; }
#ptcp-root .privacy-box h3{ font-size:13px; letter-spacing:.06em; margin-bottom:8px; }
#ptcp-root .privacy-box p{ margin:0 0 10px; }

#ptcp-root button{ font-family:inherit; cursor:pointer; border:none; }
#ptcp-root .btn{ padding:11px 22px; border-radius:3px; font-size:14px; font-weight:700; letter-spacing:.01em; }
#ptcp-root .btn-primary{ background:var(--navy); color:#fff; }
#ptcp-root .btn-primary:hover{ background:var(--navy-deep); }
#ptcp-root .btn-primary:disabled{ background:#B9BAC2; cursor:not-allowed; }
#ptcp-root .btn-ghost{ background:transparent; color:var(--navy); border:1.5px solid var(--line); }
#ptcp-root .btn-ghost:hover{ border-color:var(--navy); }
#ptcp-root .btn-gold{ background:var(--gold); color:var(--navy-deep); }
#ptcp-root .btn-gold:hover{ background:var(--gold-deep); color:#fff; }
#ptcp-root .btn-small{ padding:7px 13px; font-size:12.5px; border-radius:3px; }
#ptcp-root .btn-danger{ background:#fff; color:var(--red); border:1.5px solid var(--red); }

#ptcp-root .review-section{ margin-bottom:18px; border:1px solid var(--line-soft); border-radius:4px; overflow:hidden; }
#ptcp-root .review-section h4{ background:var(--paper); padding:9px 14px; font-size:12.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--navy-deep); border-bottom:1px solid var(--line-soft); font-family:'Lora',serif; font-weight:700;}
#ptcp-root .review-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0; }
#ptcp-root .review-item{ padding:10px 14px; border-bottom:1px solid var(--line-soft); }
#ptcp-root .review-item.full{ grid-column:1/-1; }
#ptcp-root .review-item .k{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:3px; }
#ptcp-root .review-item .v{ font-size:14px; color:var(--ink); }
@media (max-width:640px){ #ptcp-root .review-grid{ grid-template-columns:1fr; } }

#ptcp-root .nclist-row{ display:flex; gap:8px; margin-bottom:8px; }
#ptcp-root .nclist-row input{ flex:1; }

#ptcp-root .closed-wrap{ text-align:center; padding:60px 24px; }
#ptcp-root .closed-wrap .badge{ display:inline-block; background:var(--red); color:#fff; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:6px 14px; border-radius:20px; margin-bottom:16px; }

/* Landing */
#ptcp-root .landing-hero{ text-align:center; padding:44px 20px 8px; }
#ptcp-root .landing-hero .eyebrow{ text-align:center; }
#ptcp-root .landing-hero h1{ font-size:28px; margin:6px 0 12px; }
#ptcp-root .landing-hero p{ color:var(--ink-soft); max-width:62ch; margin:0 auto; font-size:14.5px; }
#ptcp-root .landing-programs-title{ text-align:center; font-size:11.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--gold-deep); font-weight:700; margin-bottom:12px; }
#ptcp-root .landing-chips{ display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
#ptcp-root .chip{ display:inline-block; background:#F1F4FC; border:1px solid var(--line); color:var(--navy-deep); font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:20px; }
#ptcp-root .landing-features{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:820px; margin:34px auto 0; padding:0 20px; }
@media (max-width:640px){ #ptcp-root .landing-features{ grid-template-columns:1fr; } }
#ptcp-root .feature-card{ background:var(--card); border:1px solid var(--line); border-radius:6px; padding:20px 18px; text-align:center; }
#ptcp-root .feature-icon{ width:38px; height:38px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; margin:0 auto 12px; }
#ptcp-root .feature-card h4{ font-family:'Lora',serif; color:var(--navy-deep); font-size:14.5px; margin-bottom:6px; }
#ptcp-root .feature-card p{ font-size:12.5px; color:var(--ink-soft); margin:0; }

#ptcp-root .draft-banner{ display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; border:1.5px solid var(--blue); background:#EEF2FD; border-radius:4px; padding:10px 14px; font-size:12.8px; color:#233A78; margin-bottom:18px; }
#ptcp-root .autosave-indicator{ font-size:11.5px; color:var(--ink-soft); }


#ptcp-root .thankyou-wrap{ text-align:center; padding:36px 24px 10px; }
#ptcp-root .thankyou-wrap .check{ width:56px; height:56px; border-radius:50%; background:var(--ok); color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; }

#ptcp-root .print-only{ display:none; }

#ptcp-root .staff-link{ text-align:center; margin-top:34px; }
#ptcp-root .staff-link a{ font-size:12px; color:var(--ink-soft); text-decoration:underline; cursor:pointer; }

/* Admin */
#ptcp-root .admin-topbar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
#ptcp-root .stat-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
#ptcp-root .stat-card{ background:#fff; border:1px solid var(--line); border-radius:4px; padding:14px 16px; }
#ptcp-root .stat-card .num{ font-family:'Lora',serif; font-size:26px; color:var(--navy-deep); font-weight:700; }
#ptcp-root .stat-card .lbl{ font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-top:2px; }
#ptcp-root .stat-card.open .num{ color:var(--ok); }
#ptcp-root table.data-table{ width:100%; border-collapse:collapse; background:#fff; font-size:13px; }
#ptcp-root table.data-table th{ background:var(--navy); color:#fff; text-align:left; padding:9px 11px; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; position:sticky; top:0; }
#ptcp-root table.data-table td{ padding:9px 11px; border-bottom:1px solid var(--line-soft); }
#ptcp-root table.data-table tr:hover td{ background:#F7F8FC; }
#ptcp-root .table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius:4px; max-height:560px; overflow-y:auto; }
#ptcp-root .pill{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
#ptcp-root .pill.open{ background:#E4F5EA; color:var(--ok); }
#ptcp-root .pill.closed{ background:#FDECEB; color:var(--red); }
#ptcp-root .modal-overlay{ position:fixed; inset:0; background:rgba(8,26,61,.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
#ptcp-root .modal{ background:#fff; max-width:720px; width:100%; max-height:88vh; overflow-y:auto; border-radius:6px; }
#ptcp-root .modal-head{ padding:18px 24px; border-bottom:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#fff; }
#ptcp-root .modal-body{ padding:20px 24px 28px; }
#ptcp-root .login-wrap{ max-width:360px; margin:60px auto; text-align:center; }
#ptcp-root .login-wrap input{ margin:14px 0; text-align:center; }
#ptcp-root .pass-field{ position:relative; margin:14px 0; }
#ptcp-root .pass-field input{ margin:0; width:100%; text-align:center; padding-right:64px; }
#ptcp-root .pass-toggle{ position:absolute; right:6px; top:50%; transform:translateY(-50%); background:var(--paper); border:1px solid var(--line); color:var(--navy); font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:3px; cursor:pointer; }
#ptcp-root .pass-toggle:hover{ border-color:var(--navy); }
#ptcp-root .spin{ text-align:center; padding:50px; color:var(--ink-soft); }

@media print{
  body *{ visibility:hidden; }
  #ptcp-root .print-area, #ptcp-root .print-area *{ visibility:visible; }
  #ptcp-root .print-area{ position:absolute; left:0; top:0; width:100%; padding:20px; display:block !important; }
  #ptcp-root .no-print{ display:none !important; }
  #ptcp-root .print-only{ display:block; }
}
</style>

  <div class="banner-wrap"><img class="banner-img" id="ptcp-banner-img" alt="Pagbangon Training Center Philippines"/></div>

        </div>
      </div>
    </div>
  </div>`;
}

/* ---------------- Storage helpers ---------------- */
const META_KEY = 'ptcp:batch-meta';
function subKey(batch, id){ return 'ptcp:submission:' + batch + ':' + id; }

async function loadMeta(){
  try{
    const r = await window.storage.get(META_KEY, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveMeta(meta){
  await window.storage.set(META_KEY, JSON.stringify(meta), true);
}
function freshMeta(){ return { currentBatch:1, counts:{1:0}, closed:{1:false}, paused:false }; }

/* ---------------- Draft autosave ---------------- */
const DRAFT_KEY = 'ptcp:my-draft';
let autosaveTimer = null;
let autosaveStatus = 'idle'; // idle | saving | saved
async function loadDraft(){
  try{
    const r = await window.storage.get(DRAFT_KEY, false);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveDraftNow(){
  try{
    autosaveStatus = 'saving';
    await window.storage.set(DRAFT_KEY, JSON.stringify({ step: state.step, data: state.data, updatedAt: Date.now() }), false);
    autosaveStatus = 'saved';
    const el = document.getElementById('autosave-indicator');
    if (el) el.textContent = 'Progress saved · ' + new Date().toLocaleTimeString();
  }catch(e){ console.warn('Autosave failed:', e); }
}
function scheduleAutosave(){
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(saveDraftNow, 800);
}
async function clearDraft(){
  try{ await window.storage.delete(DRAFT_KEY, false); }catch(e){ /* ignore */ }
}

async function saveSubmission(sub){
  await window.storage.set(subKey(sub.batch, sub.id), JSON.stringify(sub), true);
}
async function listSubmissionKeys(){
  try{
    const r = await window.storage.list('ptcp:submission:', true);
    return r ? r.keys : [];
  }catch(e){ return []; }
}
async function getSubmission(key){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}

/* ---------------- Email notifications ---------------- */
function buildStaffMessage(sub){
  return [
    'New enrollment application received.',
    '',
    'Reference No: ' + sub.id,
    'Batch: ' + sub.batch + ' (Slot ' + sub.slot + ' of ' + BATCH_LIMIT + ')',
    'Full Name: ' + (sub.data.fullName || ''),
    'Contact Number: ' + (sub.data.contact || ''),
    'Email: ' + (sub.data.email || ''),
    'Program: ' + (sub.data.courseProgram || ''),
    'Submitted: ' + new Date(sub.submittedAt).toLocaleString(),
    '',
    'View the full application in the PTCP Staff Portal.',
  ].join('\n');
}
async function sendEnrollmentEmails(sub){
  if (!EMAIL_CONFIG.enabled || !EMAIL_CONFIG.web3formsAccessKey) return;
  try{
    await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        access_key: EMAIL_CONFIG.web3formsAccessKey,
        subject: EMAIL_CONFIG.staffNotifySubject + ' — ' + (sub.data.fullName || ''),
        from_name: 'PTCP Enrollment System',
        name: sub.data.fullName || '',
        email: sub.data.email || '',
        replyto: sub.data.email || '',
        message: buildStaffMessage(sub),
      })
    });
  }catch(e){ console.warn('Email notification failed:', e); }
}

/* ---------------- File helpers ---------------- */
function readFileAsDataURL(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function compressImage(dataUrl, maxDim, quality){
  return new Promise((res)=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if (w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
      else if (h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
      ctx.drawImage(img, 0, 0, w, h);
      res(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = ()=>res(dataUrl);
    img.src = dataUrl;
  });
}
async function handleFileInput(fieldId, file){
  if (!file) return;
  let dataUrl = await readFileAsDataURL(file);
  let isImage = file.type.startsWith('image/');
  if (isImage){
    dataUrl = await compressImage(dataUrl, 1100, 0.72);
  }
  const approxKB = Math.round((dataUrl.length * 0.75) / 1024);
  setData(fieldId, { name:file.name, type:file.type, dataUrl, approxKB, isImage });
}

/* ---------------- Validation ---------------- */
function stepFields(step){ return step.fields || []; }
function validateStep(step){
  const errs = {};
  if (step.kind === 'intro'){
    if (!state.data.privacyAgree) errs.privacyAgree = 'Please read and agree to the Data Privacy Notice to continue.';
  } else if (step.kind === 'nclist'){
    const list = state.data.ncPrograms || [];
    const filled = list.filter(v => v && v.trim());
    if (filled.length === 0) errs.ncPrograms = 'Please specify at least one NC Level and Program.';
  } else if (step.kind === 'fields'){
    stepFields(step).forEach(f=>{
      if (!f.required) return;
      const v = state.data[f.id];
      if (f.type === 'checkbox'){ if (!v) errs[f.id] = 'Required.'; }
      else if (f.type === 'file'){ if (!v) errs[f.id] = 'Please upload a file.'; }
      else if (f.type === 'radio'){
        if (!v) errs[f.id] = 'Please select an option.';
        else if (f.allowOther && v === '__OTHER__' && !(state.data[f.id+'_other'] && state.data[f.id+'_other'].trim())) errs[f.id] = 'Please specify.';
      } else {
        if (!v || !String(v).trim()) errs[f.id] = 'This field is required.';
      }
    });
  }
  return errs;
}

function visibleSteps(){
  return STEPS.filter(s => !s.condition || s.condition(state.data));
}

/* ---------------- Small render helpers ---------------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fieldError(id){ return state.errors[id] ? '<div class="err">'+esc(state.errors[id])+'</div>' : ''; }

function renderField(f){
  const val = state.data[f.id];
  let inner = '';
  if (f.type === 'text' || f.type === 'tel' || f.type === 'date'){
    inner = `<input type="${f.type}" data-field="${f.id}" value="${esc(val||'')}" placeholder="${esc(f.placeholder||'')}" />`;
  } else if (f.type === 'textarea'){
    inner = `<textarea data-field="${f.id}" placeholder="${esc(f.placeholder||'')}">${esc(val||'')}</textarea>`;
  } else if (f.type === 'select'){
    inner = `<select data-field="${f.id}"><option value="">Select...</option>` +
      f.options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('') + `</select>`;
  } else if (f.type === 'radio'){
    inner = '<div class="options">' + f.options.map(o=>{
      const checked = val === o;
      return `<label class="opt-row ${checked?'checked':''}"><input type="radio" name="${f.id}" data-field="${f.id}" value="${esc(o)}" ${checked?'checked':''}/><span>${esc(o)}</span></label>`;
    }).join('') + (f.allowOther ? `<label class="opt-row ${val==='__OTHER__'?'checked':''}"><input type="radio" name="${f.id}" data-field="${f.id}" value="__OTHER__" ${val==='__OTHER__'?'checked':''}/><span>Other</span></label>` : '') + '</div>';
    if (f.allowOther && val === '__OTHER__'){
      inner += `<div class="opt-other-input"><input type="text" data-field="${f.id}_other" placeholder="Please specify" value="${esc(state.data[f.id+'_other']||'')}"/></div>`;
    }
  } else if (f.type === 'checkbox'){
    inner = `<div class="checkbox-row"><input type="checkbox" id="cb_${f.id}" data-field="${f.id}" ${val?'checked':''}/><label for="cb_${f.id}">${esc(f.label)}</label></div>`;
    return `<div class="field">${inner}${fieldError(f.id)}</div>`;
  } else if (f.type === 'file'){
    const has = !!val;
    inner = `<div class="file-drop ${has?'has-file':''}">
        <label class="file-btn">Choose File<input type="file" accept="image/*,.pdf" data-filefield="${f.id}"/></label>
        ${has ? `<div class="file-name">${esc(val.name)} (${val.approxKB} KB)</div>` : ''}
        ${has && val.isImage ? `<img class="file-preview" src="${val.dataUrl}"/>` : ''}
        ${has && !val.isImage ? `<div class="file-note">PDF/document attached.</div>` : ''}
        <div class="file-note">Accepted: JPG, PNG, or PDF. Images are auto-compressed for storage.</div>
      </div>`;
  }
  return `<div class="field">
      <label class="field-label">${esc(f.label)} ${f.required?'<span class="req">*</span>':''}</label>
      ${f.hint ? `<div class="field-hint">${esc(f.hint)}</div>` : ''}
      ${inner}
      ${fieldError(f.id)}
    </div>`;
}

/* ---------------- PDF generation (jsPDF) ---------------- */
let _jspdfLoadPromise = null;
function loadScriptOnce(src){
  return new Promise((resolve, reject)=>{
    if (document.querySelector('script[data-src="'+src+'"]')){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.setAttribute('data-src', src);
    s.onload = ()=>resolve();
    s.onerror = ()=>reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}
function ensureJsPDF(){
  if (!_jspdfLoadPromise){
    _jspdfLoadPromise = loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
      .then(()=> loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js'));
  }
  return _jspdfLoadPromise;
}
function buildSubmissionPDF(sub){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 42;
  const imgW = pageW - margin*2;
  const imgH = imgW / 3; // banner is 1500x500
  doc.addImage('data:image/jpeg;base64,' + HEADER_B64, 'JPEG', margin, 28, imgW, imgH);
  let y = 28 + imgH + 22;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('Official Enrollment Form — Submission Record', pageW/2, y, { align:'center' });
  y += 15;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,90,90);
  doc.text('Batch ' + sub.batch + ', Slot ' + sub.slot + ' of ' + BATCH_LIMIT + '   |   Reference No: ' + sub.id + '   |   Submitted: ' + new Date(sub.submittedAt).toLocaleString(), pageW/2, y, { align:'center' });
  doc.setTextColor(0,0,0);
  y += 18;

  const steps = STEPS.filter(s=>s.kind==='fields');
  steps.forEach(step=>{
    const body = step.fields.filter(f=>f.type!=='file').map(f=>{
      const v = displayVal(f);
      return [f.label, (v===undefined||v===null||v==='') ? '—' : String(v)];
    });
    doc.autoTable({
      startY: y,
      head: [[step.title, '']],
      body: body,
      theme: 'grid',
      styles: { fontSize:9, cellPadding:5, valign:'top' },
      headStyles: { fillColor:[15,42,92], textColor:255, fontSize:10, halign:'left' },
      columnStyles: { 0:{ fontStyle:'bold', cellWidth:190 } },
      margin: { left:margin, right:margin },
      didParseCell: function(data){ if (data.row.index===0 && data.section==='head' && data.column.index===1){ data.cell.text = []; } }
    });
    y = doc.lastAutoTable.finalY + 14;
    if (y > 700 && step !== steps[steps.length-1]){ doc.addPage(); y = 40; }
  });

  if (sub.data.hasNC === 'Yes'){
    const ncList = (sub.data.ncPrograms||[]).filter(Boolean);
    if (ncList.length){
      doc.autoTable({
        startY: y,
        head: [['Prior TESDA Training / NC Level and Program', '']],
        body: ncList.map(v=>[v, '']),
        theme:'grid',
        styles:{ fontSize:9, cellPadding:5 },
        headStyles:{ fillColor:[15,42,92], textColor:255, fontSize:10 },
        margin:{ left:margin, right:margin },
      });
      y = doc.lastAutoTable.finalY + 14;
    }
  }

  doc.setFontSize(8.5); doc.setTextColor(90,90,90);
  doc.text("This is a system-generated record of the applicant's submitted answers. Uploaded documents are on file with PTCP and are not reproduced on this printout.", margin, y, { maxWidth: pageW - margin*2 });
  y += 34;
  doc.setTextColor(0,0,0); doc.setFontSize(9);
  doc.text('_____________________________', margin, y);
  doc.text("Applicant's Signature", margin, y+13);
  doc.text('_____________________________', pageW - margin - 170, y);
  doc.text('PTCP Staff / Registrar', pageW - margin - 170, y+13);

  return doc;
}
async function downloadSubmissionPDF(sub){
  setState({ pdfBusy:true, pdfError:'' });
  try{
    await ensureJsPDF();
    const doc = buildSubmissionPDF(sub);
    doc.save('PTCP-Enrollment-' + sub.id + '.pdf');
    setState({ pdfBusy:false, pdfError:'' });
  }catch(e){
    console.error('PDF generation failed:', e);
    setState({ pdfBusy:false, pdfError:'Could not generate the PDF. Please check your connection and try again, or use the Print option instead.' });
  }
}

function csvEscape(v){ if (v==null) return ''; const s=String(v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function exportCSV(rows){
  const cols = ['batch','slot','id','submittedAt','fullName','dob','address','contact','sex','civilStatus','nationality','religion','education','hasNC','ncPrograms','courseProgram','howLearned','idType','paymentMode'];
  const header = cols.join(',');
  const lines = rows.map(r=>{
    const d = r.data || {};
    return cols.map(c=>{
      if (c==='batch') return csvEscape(r.batch);
      if (c==='slot') return csvEscape(r.slot);
      if (c==='id') return csvEscape(r.id);
      if (c==='submittedAt') return csvEscape(r.submittedAt);
      if (c==='ncPrograms') return csvEscape((d.ncPrograms||[]).filter(Boolean).join('; '));
      let v = d[c];
      if (v === '__OTHER__') v = 'Other - ' + (d[c+'_other']||'');
      return csvEscape(v);
    }).join(',');
  });
  const csv = [header].concat(lines).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ptcp-enrollment-batch.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function loadAdminData(){
  setState({ admin: Object.assign({}, state.admin, { loading:true, error:'' }) });
  const meta = await loadMeta() || freshMeta();
  const keys = await listSubmissionKeys();
  const rows = [];
  for (const k of keys){
    const s = await getSubmission(k);
    if (s) rows.push(s);
  }
  rows.sort((a,b)=> (a.batch-b.batch) || (a.slot-b.slot));
  const batchNums = Array.from(new Set(rows.map(r=>r.batch).concat([meta.currentBatch]))).sort((a,b)=>a-b);
  setState({ admin: Object.assign({}, state.admin, {
    loading:false, meta, rows, batchNums,
    batch: state.admin.batch === undefined || state.admin.batch === null ? 'all' : state.admin.batch,
    search: state.admin.search || ''
  }) });
}

function deleteSubmission(row){
  showConfirm(
    'Delete the application record for "' + (row.data.fullName||'this applicant') + '"? This cannot be undone.',
    ()=> performDeleteSubmission(row),
    { confirmLabel:'Delete', danger:true }
  );
}
async function performDeleteSubmission(row){
  try{
    await window.storage.delete(subKey(row.batch, row.id), true);
    let meta = state.admin.meta || (await loadMeta()) || freshMeta();
    meta.counts[row.batch] = Math.max(0, (meta.counts[row.batch]||0) - 1);
    if (row.batch === meta.currentBatch && meta.counts[row.batch] < BATCH_LIMIT){
      meta.closed[row.batch] = false;
    }
    await saveMeta(meta);
    setState({ admin: Object.assign({}, state.admin, { modalRow:null, error:'' }) });
  }catch(e){
    console.warn('Delete failed:', e);
    setState({ admin: Object.assign({}, state.admin, { error:'Could not delete that record. Please try again.' }) });
  }
  await loadAdminData();
}

function renderAdmin(){
  if (!state.admin.authed) return renderAdminLogin();
  if (state.admin.loading || !state.admin.meta) return `<div class="shell"><div class="spin">Loading enrollment records…</div></div>`;
  return renderAdminDashboard();
}

/* ---------------- Master render ---------------- */
function render(){
  let html;
  if (state.screen === 'landing') html = renderLanding();
  else if (state.screen === 'loading') html = `<div class="shell"><div class="spin">Loading form…</div></div>`;
  else if (state.screen === 'closed') html = renderClosed();
  else if (state.screen === 'form') html = renderForm();
  else if (state.screen === 'thankyou') html = renderThankYou();
  else if (state.screen === 'admin') html = renderAdmin();
  if (state.printPreview) html += renderPrintPreviewModal(state.printPreview);
  if (state.confirmDialog) html += renderConfirmDialog();
  app.innerHTML = html;
  wireEvents();
}

function wireEvents(){
  app.querySelectorAll('input[data-field], textarea[data-field], select[data-field]').forEach(el=>{
    const id = el.getAttribute('data-field');
    if (el.type === 'checkbox'){
      el.addEventListener('change', ()=> setData(id, el.checked));
    } else if (el.type === 'radio'){
      el.addEventListener('change', ()=> setData(id, el.value));
    } else {
      el.addEventListener('change', ()=> setData(id, el.value));
      el.addEventListener('blur', ()=> setData(id, el.value));
    }
  });
  app.querySelectorAll('input[data-filefield]').forEach(el=>{
    el.addEventListener('change', (e)=>{
      const id = el.getAttribute('data-filefield');
      const f = e.target.files[0];
      if (f) handleFileInput(id, f);
    });
  });
  app.querySelectorAll('input[data-nc-index]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const i = parseInt(el.getAttribute('data-nc-index'),10);
      const list = (state.data.ncPrograms && state.data.ncPrograms.length ? state.data.ncPrograms.slice() : ['']);
      list[i] = el.value;
      state.data = Object.assign({}, state.data, { ncPrograms: list });
      scheduleAutosave();
    });
  });
  app.querySelectorAll('[data-nc-remove]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const i = parseInt(el.getAttribute('data-nc-remove'),10);
      const list = (state.data.ncPrograms||['']).slice();
      list.splice(i,1);
      setData('ncPrograms', list.length?list:['']);
    });
  });
  const ncAdd = document.getElementById('nc-add-btn');
  if (ncAdd) ncAdd.addEventListener('click', ()=>{
    const list = (state.data.ncPrograms && state.data.ncPrograms.length ? state.data.ncPrograms.slice() : ['']);
    list.push('');
    setData('ncPrograms', list);
  });

  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', goBack);
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.addEventListener('click', goNext);
  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.addEventListener('click', submitApplication);

  ['staff-link-1','staff-link-2','staff-link-3'].forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', ()=> setState({ screen:'admin' }));
  });

  const landingApply = document.getElementById('landing-apply');
  if (landingApply) landingApply.addEventListener('click', boot);
  const landingStaff = document.getElementById('landing-staff');
  if (landingStaff) landingStaff.addEventListener('click', ()=> setState({ screen:'admin' }));
  const homeLink = document.getElementById('home-link');
  if (homeLink) homeLink.addEventListener('click', ()=> setState({ screen:'landing' }));
  const restartLink = document.getElementById('restart-link');
  if (restartLink) restartLink.addEventListener('click', restartForm);
  const restartLink2 = document.getElementById('restart-link-2');
  if (restartLink2) restartLink2.addEventListener('click', restartForm);
  const dismissDraftBanner = document.getElementById('dismiss-draft-banner');
  if (dismissDraftBanner) dismissDraftBanner.addEventListener('click', ()=> setState({ draftRestored:false }));

  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', ()=> setState({ printPreview: state.lastSubmission }));
  const newAppBtn = document.getElementById('new-app-btn');
  if (newAppBtn) newAppBtn.addEventListener('click', ()=> boot());
  const closedRecheck = document.getElementById('closed-recheck');
  if (closedRecheck) closedRecheck.addEventListener('click', ()=> boot());
  const previewPdfBtn = document.getElementById('preview-pdf-btn');
  if (previewPdfBtn) previewPdfBtn.addEventListener('click', ()=> downloadSubmissionPDF(state.printPreview));
  const previewPrintBtn = document.getElementById('preview-print-btn');
  if (previewPrintBtn) previewPrintBtn.addEventListener('click', ()=> window.print());
  const previewCloseBtn = document.getElementById('preview-close-btn');
  if (previewCloseBtn) previewCloseBtn.addEventListener('click', ()=> setState({ printPreview:null, pdfError:'' }));
  const previewOverlay = document.getElementById('preview-overlay');
  if (previewOverlay) previewOverlay.addEventListener('click', (e)=>{ if (e.target === previewOverlay) setState({ printPreview:null, pdfError:'' }); });

  // admin
  const aBack = document.getElementById('admin-back');
  if (aBack) aBack.addEventListener('click', ()=> boot());
  const aPass = document.getElementById('admin-pass');
  if (aPass){
    aPass.addEventListener('input', ()=>{ state.admin.pass = aPass.value; });
    aPass.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') document.getElementById('admin-login-btn').click(); });
  }
  const aPassToggle = document.getElementById('admin-pass-toggle');
  if (aPassToggle) aPassToggle.addEventListener('click', ()=>{
    setState({ admin: Object.assign({}, state.admin, { showPass: !state.admin.showPass }) });
    const el = document.getElementById('admin-pass');
    if (el){ el.focus(); const v = el.value; el.setSelectionRange(v.length, v.length); }
  });
  const aLogin = document.getElementById('admin-login-btn');
  if (aLogin) aLogin.addEventListener('click', async ()=>{
    if (state.admin.pass === ADMIN_CODE){
      setState({ admin: Object.assign({}, state.admin, { authed:true, error:'' }) });
      await loadAdminData();
    } else {
      setState({ admin: Object.assign({}, state.admin, { error:'Incorrect passcode.' }) });
    }
  });
  const aLogout = document.getElementById('admin-logout');
  if (aLogout) aLogout.addEventListener('click', ()=>{ setState({ admin:{ authed:false, pass:'', showPass:false, loading:false, meta:null, batch:'all', search:'', rows:[], modalRow:null, error:'' } }); boot(); });
  const aRefresh = document.getElementById('admin-refresh');
  if (aRefresh) aRefresh.addEventListener('click', loadAdminData);
  const aClose = document.getElementById('admin-close-batch');
  if (aClose) aClose.addEventListener('click', ()=>{
    showConfirm('Force-close the current batch and start a new one now, even if it is not yet full?', async ()=>{
      let meta = state.admin.meta;
      meta.closed[meta.currentBatch] = true;
      meta = ensureOpenBatch(meta);
      await saveMeta(meta);
      await loadAdminData();
    }, { confirmLabel:'Close & Start New', danger:true });
  });
  const aTogglePause = document.getElementById('admin-toggle-pause');
  if (aTogglePause) aTogglePause.addEventListener('click', async ()=>{
    let meta = state.admin.meta;
    meta.paused = !meta.paused;
    await saveMeta(meta);
    await loadAdminData();
  });
  const aSelect = document.getElementById('admin-batch-select');
  if (aSelect) aSelect.addEventListener('change', ()=>{
    const v = aSelect.value === 'all' ? 'all' : parseInt(aSelect.value,10);
    setState({ admin: Object.assign({}, state.admin, { batch: v }) });
  });
  const aSearch = document.getElementById('admin-search');
  if (aSearch) aSearch.addEventListener('input', ()=>{ state.admin.search = aSearch.value; });
  const aExport = document.getElementById('admin-export');
  if (aExport) aExport.addEventListener('click', ()=>{
    const b = state.admin.batch === undefined || state.admin.batch === null ? 'all' : state.admin.batch;
    exportCSV(b==='all' ? state.admin.rows : state.admin.rows.filter(r=>r.batch===b));
  });
  app.querySelectorAll('[data-view-row]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-view-row');
      const row = state.admin.rows.find(r=>r.id===id);
      setState({ admin: Object.assign({}, state.admin, { modalRow: row }) });
    });
  });
  app.querySelectorAll('[data-delete-row]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-delete-row');
      const row = state.admin.rows.find(r=>r.id===id);
      if (row) deleteSubmission(row);
    });
  });
  const modalClose = document.getElementById('modal-close');
  if (modalClose) modalClose.addEventListener('click', ()=> setState({ admin: Object.assign({}, state.admin, { modalRow:null }) }));
  const modalOverlay = document.getElementById('modal-overlay');
  if (modalOverlay) modalOverlay.addEventListener('click', (e)=>{ if (e.target === modalOverlay) setState({ admin: Object.assign({}, state.admin, { modalRow:null }) }); });
  const modalPrint = document.getElementById('modal-print');
  if (modalPrint) modalPrint.addEventListener('click', ()=> setState({ printPreview: state.admin.modalRow }));
  const modalDelete = document.getElementById('modal-delete');
  if (modalDelete) modalDelete.addEventListener('click', ()=> deleteSubmission(state.admin.modalRow));

  const confirmOkBtn = document.getElementById('confirm-ok-btn');
  if (confirmOkBtn) confirmOkBtn.addEventListener('click', ()=>{
    const cb = state.confirmDialog && state.confirmDialog.onConfirm;
    setState({ confirmDialog: null });
    if (cb) cb();
  });
  const confirmCancelBtn = document.getElementById('confirm-cancel-btn');
  if (confirmCancelBtn) confirmCancelBtn.addEventListener('click', ()=> setState({ confirmDialog: null }));
  const confirmOverlay = document.getElementById('confirm-overlay');
  if (confirmOverlay) confirmOverlay.addEventListener('click', (e)=>{ if (e.target === confirmOverlay) setState({ confirmDialog: null }); });
}

/* ---------------- Navigation / Submit ---------------- */
function goNext(){
  const steps = visibleSteps();
  const idx = Math.max(0, Math.min(state.step, steps.length-1));
  const step = steps[idx];
  const errs = validateStep(step);
  if (Object.keys(errs).length){ setState({ errors: errs, step: idx }); return; }
  setState({ errors:{}, step: Math.min(idx+1, steps.length-1) });
  scheduleAutosave();
  window.scrollTo({top:0, behavior:'smooth'});
}
function goBack(){
  const steps = visibleSteps();
  const idx = Math.max(0, Math.min(state.step, steps.length-1));
  setState({ errors:{}, step: Math.max(idx-1, 0) });
  scheduleAutosave();
  window.scrollTo({top:0, behavior:'smooth'});
}

function ensureOpenBatch(meta){
  let cb = meta.currentBatch;
  let guard = 0;
  while ((meta.closed[cb] || (meta.counts[cb]||0) >= BATCH_LIMIT) && guard < 500){
    cb = cb + 1;
    if (meta.counts[cb] === undefined) meta.counts[cb] = 0;
    if (meta.closed[cb] === undefined) meta.closed[cb] = false;
    guard++;
  }
  meta.currentBatch = cb;
  return meta;
}

async function submitApplication(){
  if (state.submitting) return;
  setState({ submitting:true });
  try{
    let meta = await loadMeta();
    if (!meta) meta = freshMeta();
    if (meta.paused){
      setState({ submitting:false, meta, screen:'closed' });
      return;
    }
    meta = ensureOpenBatch(meta);
    const cb = meta.currentBatch;
    const curCount = meta.counts[cb] || 0;
    const newCount = curCount + 1;
    meta.counts[cb] = newCount;
    if (newCount >= BATCH_LIMIT) meta.closed[cb] = true;
    await saveMeta(meta);

    const id = 'PTCP-' + cb + '-' + String(newCount).padStart(2,'0') + '-' + Date.now().toString(36).toUpperCase();
    const submission = { id, batch: cb, slot: newCount, submittedAt: new Date().toISOString(), data: state.data };
    await saveSubmission(submission);
    sendEnrollmentEmails(submission);
    await clearDraft();

    setState({ submitting:false, meta, screen:'thankyou', lastSubmission: submission });
    window.scrollTo({top:0, behavior:'smooth'});
  }catch(e){
    console.error(e);
    setState({ submitting:false, errors:{ _global:'Something went wrong submitting your application. Please try again.' } });
  }
}

/* ---------------- Boot ---------------- */
async function boot(){
  setState({ screen:'loading', step:0, data:{}, errors:{}, submitting:false, lastSubmission:null, printPreview:null, draftRestored:false });
  let meta = await loadMeta();
  if (!meta){ meta = freshMeta(); await saveMeta(meta); }
  if (meta.paused){
    setState({ screen:'closed', meta });
    return;
  }
  const before = meta.currentBatch;
  meta = ensureOpenBatch(meta);
  if (meta.currentBatch !== before) await saveMeta(meta);

  const draft = await loadDraft();
  if (draft && draft.data && Object.keys(draft.data).length > 0){
    setState({ screen:'form', meta, data: draft.data, step: Math.max(0, draft.step||0), draftRestored:true });
  } else {
    setState({ screen:'form', meta });
  }
}

function restartForm(){
  showConfirm('This will clear all your answers on this device and start a fresh application. Continue?', async ()=>{
    await clearDraft();
    setState({ step:0, data:{}, errors:{}, draftRestored:false });
  }, { confirmLabel:'Clear & Start Over', danger:true });
}

render();
})();
</script>
